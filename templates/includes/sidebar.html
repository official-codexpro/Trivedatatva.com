{% load static %}
<!-- ================= MOBILE SIDEBAR :START ================= -->
<div id="sidebar"
    class="fixed top-0 right-0 h-full w-72 bg-white shadow-xl z-[1000] translate-x-full transition-transform duration-500">

    <!-- Header -->
    <div class="flex justify-between items-center p-6 border-b">
        <h2 class="text-lg font-bold text-teal-700">Menu</h2>
        <button id="closeSidebar" class="text-xl text-gray-600 hover:text-teal-600 transition">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Navigation Links -->
    <nav class="flex flex-col p-6 text-gray-700 font-medium">

        <!-- Home -->
        <a href="{% url 'home' %}" class="py-3 border-b border-gray-100 hover:text-teal-600 transition">
            Home
        </a>

        <!-- Category with Sub-links -->
        <div class="py-3 border-b border-gray-100">
            <p class="text-gray-900 font-semibold">Category</p>

            <div class="mt-3 ml-4 flex flex-col text-gray-600 divide-y divide-gray-100">
                <a href="{% url 'product_detail' 'pulmodetox' %}" class="py-3 hover:text-teal-600 transition">
                    PulmoDetox
                </a>
                <a href="{% url 'product_detail' 'trimxa' %}" class="py-3 hover:text-teal-600 transition">
                    Trimxa
                </a>
                <a href="{% url 'product_detail' 'pco-relief' %}" class="py-3 hover:text-teal-600 transition">
                    PCO-Relief
                </a>
            </div>
        </div>

        <!-- All Products -->
        <a href="{% url 'product_list' %}" class="py-3 border-b border-gray-100 hover:text-teal-600 transition">
            All Products
        </a>

        <!-- About -->
        <a href="{% url 'about' %}" class="py-3 border-b border-gray-100 hover:text-teal-600 transition">
            About
        </a>

        <!-- Contact -->
        <a href="{% url 'contact' %}" class="py-3 hover:text-teal-600 transition">
            Contact
        </a>

    </nav>

</div>

<!-- Overlay -->
<div id="overlay"
    class="fixed inset-0 bg-black/40 opacity-0 invisible transition-all duration-300 z-[999]">
</div>
<!-- ================= MOBILE SIDEBAR :END ================= -->
