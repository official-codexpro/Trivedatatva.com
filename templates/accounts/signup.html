{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up - Trivedatatva{% endblock %}

{% block content %}
<section class="py-20 lg:py-32 bg-white border-b border-gray-50">

<div class="mx-auto w-full 
max-w-[1000px] lg:max-w-[1100px] 
px-5 md:px-6">

    <!-- ================= HEADER ================= -->
    <div class="text-center mb-16">

        <span class="text-purple-600 text-xs font-black uppercase tracking-[0.3em]">
            Account
        </span>

        <h1 class="text-3xl lg:text-5xl font-extrabold text-slate-800 mt-4 tracking-tight">
            Create Account<span class="text-purple-400">.</span>
        </h1>

        <p class="text-slate-500 mt-4 text-lg font-medium max-w-xl mx-auto">
            Join and start your wellness journey with clinically backed Ayurvedic care.
        </p>

    </div>


    <!-- ================= FORM CARD ================= -->
    <div class="bg-white border border-slate-100 p-8 lg:p-12 shadow-sm">

        <form method="POST" action="{% url 'signup' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
            {% csrf_token %}

            <!-- GRID FORM -->
            <div class="grid md:grid-cols-2 gap-6">

                <!-- FULL NAME -->
                <div class="md:col-span-2"> 
                    <label class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">
                        Full Name
                    </label>
                    <input type="text" name="full_name" required
                        class="w-full mt-3 border border-slate-200 px-4 py-3 
                        focus:outline-none focus:border-purple-500 transition"
                        placeholder="Enter your full name">
                </div>

                <!-- EMAIL -->
                <div>
                    <label class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">
                        Email Address
                    </label>
                    <input type="email" name="email" required
                        class="w-full mt-3 border border-slate-200 px-4 py-3 
                        focus:outline-none focus:border-purple-500 transition"
                        placeholder="you@example.com">
                </div>

                <!-- PHONE -->
                <div>
                    <label class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">
                        Phone Number
                    </label>
                    <input type="tel" name="phone"
                        class="w-full mt-3 border border-slate-200 px-4 py-3 
                        focus:outline-none focus:border-purple-500 transition"
                        placeholder="+91 XXXXX XXXXX">
                </div>

                <!-- PASSWORD -->
                <div>
                    <label class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">
                        Password
                    </label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full mt-3 border border-slate-200 px-4 py-3 
                        focus:outline-none focus:border-purple-500 transition"
                        placeholder="Minimum 6 characters">
                </div>

                <!-- CONFIRM PASSWORD -->
                <div>
                    <label class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">
                        Confirm Password
                    </label>
                    <input type="password" name="confirm_password" required minlength="6"
                        class="w-full mt-3 border border-slate-200 px-4 py-3 
                        focus:outline-none focus:border-purple-500 transition"
                        placeholder="Re-enter password">
                </div>

            </div>

            <!-- BUTTON -->
            <div class="mt-10 flex flex-col sm:flex-row items-center justify-between gap-6">

                <button type="submit"
                    class="w-full sm:w-auto px-14 py-4 bg-purple-600 text-white text-sm font-black uppercase tracking-[0.2em] 
                    rounded-sm hover:bg-slate-900 transition-all duration-300">
                    Create Account
                </button>

                <p class="text-sm text-slate-500 font-medium">
                    Already have an account?
                    <a href="{% url 'login' %}" class="text-purple-600 font-bold hover:text-purple-700 transition">
                        Login
                    </a>
                </p>

            </div>

        </form>

    </div>

</div>
</section>
{% endblock %}
