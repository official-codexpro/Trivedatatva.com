{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Trivedatatva{% endblock %}

{% block content %}
<section class="py-20 lg:py-28 bg-white border-b border-gray-50">

<div class="mx-auto w-full max-w-md px-5 md:px-6">

    <!-- ================= HEADER ================= -->
    <div class="text-center mb-12">

        <span class="text-purple-600 text-xs font-black uppercase tracking-[0.3em]">
            Account
        </span>

        <h1 class="text-3xl lg:text-4xl font-extrabold text-slate-800 mt-3 tracking-tight">
            Welcome Back<span class="text-purple-400">.</span>
        </h1>

        <p class="text-slate-500 mt-3 font-medium">
            Login to your account to continue
        </p>

    </div>


    <!-- ================= CARD ================= -->
    <div class="bg-white border border-slate-100 p-8 shadow-sm">

        <form method="POST" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
            {% csrf_token %}

            <!-- INPUTS -->
            <div class="space-y-6">

                <!-- EMAIL -->
                <div>
                    <label for="email" class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">
                        Email Address
                    </label>

                    <input type="email" id="email" name="email" required
                        class="w-full mt-3 border border-slate-200 px-4 py-3 
                        focus:outline-none focus:border-purple-500 transition-all"
                        placeholder="you@example.com">
                </div>

                <!-- PASSWORD -->
                <div>
                    <label for="password" class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">
                        Password
                    </label>

                    <input type="password" id="password" name="password" required
                        class="w-full mt-3 border border-slate-200 px-4 py-3 
                        focus:outline-none focus:border-purple-500 transition-all"
                        placeholder="Enter your password">
                </div>

            </div>

            <!-- BUTTON -->
            <button type="submit"
                class="w-full mt-8 px-10 py-4 bg-purple-600 text-white text-sm font-black uppercase tracking-[0.2em] 
                rounded-sm hover:bg-slate-900 transition-all duration-300">
                Login
            </button>

        </form>

        <!-- FOOTER -->
        <p class="text-center text-sm text-slate-500 mt-8 font-medium">
            Don't have an account?
            <a href="{% url 'signup' %}" 
               class="text-purple-600 font-bold hover:text-purple-700 transition">
               Sign Up
            </a>
        </p>

    </div>

</div>
</section>
{% endblock %}
